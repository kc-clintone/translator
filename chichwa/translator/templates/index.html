<!DOCTYPE html>
<html>
<head>
    <title>Translatr</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f7f3e9; /* soft cream */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            width: 500px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-size: 32px;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: none;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #c7bfa6;
            box-shadow: 0 0 0 3px rgba(199,191,166,0.2);
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background-color: #d6c7a1;
            color: #333;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background-color: #cbb98c;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #faf8f1;
            border: 1px solid #eee;
            font-size: 16px;
            min-height: 20px;
        }

        .subtitle {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
<h2>Translatr</h2>

<textarea id="text" rows="4" placeholder="Enter text to translate..."></textarea>

<br>

{% comment %} Language selection {% endcomment %}
<select id="lang">
    <option value="sw">Swahili</option>
    <option value="en">English</option>
</select>

<br>

<button onclick="translateText()">Translate</button>

<div id="result"></div>
</div>
{% comment %} Logic to fetch API {% endcomment %}
<script>
async function translateText() {
    const text = document.getElementById("text").value;
    const lang = document.getElementById("lang").value;

    const response = await fetch("/api/v1/translate-text", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text,
            targetLanguage: lang
        })
    });

    const data = await response.json();
    document.getElementById("result").innerText = data.translatedText;
}
</script>

</body>
</html>
